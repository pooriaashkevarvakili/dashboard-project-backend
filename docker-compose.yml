services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dashboard
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  nestjs:
    build: .
    container_name: nest-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      PORT: 8000
      NODE_ENV: production

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: dashboard
    depends_on:
      - postgres

volumes:
  pg_data: